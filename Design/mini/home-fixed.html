<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>首页修正版</title>
  <link rel="stylesheet" href="shared-ui.css">
</head>
<body>
  <main class="phone">
    <div class="statusbar"><span>中国联通 5G</span><span>14:48</span><span>84%</span></div>
    <div class="navbar"><span></span><div class="nav-title">首页</div><div class="capsule">•••</div></div>

    <section class="page">

      <section class="section">
        <article class="card">
          <div class="tag attention">今日重点</div>
          <h1 class="page-title" style="margin-top:12px;font-size:24px">父亲｜血压连续 3 次偏高</h1>
          <p class="page-subtitle" style="max-width:none">建议复诊前连续记录 7 天早晚血压，带上最近一次体检报告。</p>
          <button type="button" class="text-link" style="margin-top:12px">查看详情</button>
        </article>
      </section>

      <section class="section">
        <div class="section-header">
          <div class="section-title">待办提醒</div>
          <button type="button" class="text-link">查看全部</button>
        </div>
        <div class="stack" style="gap:var(--space-4)">
          <article class="reminder-card card">
            <div class="reminder-top">
              <div class="reminder-main">
                <div class="reminder-title">父亲｜心内科复诊</div>
                <div class="reminder-time">今天 15:30</div>
              </div>
              <span class="tag warn">今日</span>
            </div>
            <div class="reminder-note">带近期血压记录和 06/01 体检报告。</div>
            <div class="reminder-actions">
              <button class="ghost-btn btn-with-icon" type="button">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
                <span>完成</span>
              </button>
              <button class="ghost-btn muted btn-with-icon" type="button">
                <span>改期</span>
              </button>
            </div>
          </article>
          <article class="reminder-card card">
            <div class="reminder-top">
              <div class="reminder-main">
                <div class="reminder-title">母亲｜复查空腹血糖</div>
                <div class="reminder-time">3 天后</div>
              </div>
              <span class="tag info">提醒</span>
            </div>
          </article>
        </div>
      </section>

      <section class="section">
        <article class="card">
          <div class="reminder-top">
            <div>
              <div class="section-title">重点指标趋势</div>
              <div class="reminder-time">近 3 次报告摘要</div>
            </div>
            <span class="tag info">趋势摘要</span>
          </div>
          <div class="metric-grid">
            <div class="metric-item">
              <div class="metric-name">尿酸</div>
              <div class="metric-value">468<span class="metric-unit">μmol/L</span></div>
              <div class="metric-trend warn">↑ 偏高</div>
            </div>
            <div class="metric-item">
              <div class="metric-name">血糖</div>
              <div class="metric-value">5.6<span class="metric-unit">mmol/L</span></div>
              <div class="metric-trend">→ 平稳</div>
            </div>
            <div class="metric-item">
              <div class="metric-name">LDL-C</div>
              <div class="metric-value">3.72<span class="metric-unit">mmol/L</span></div>
              <div class="metric-trend warn">↑ 偏高</div>
            </div>
          </div>
          <div class="reminder-note">单位保持最小层级，优先突出数值和趋势。</div>
        </article>
      </section>

      <section class="section quick-actions card">
        <div class="section-title">快捷操作</div>
        <div class="quick-grid" style="gap:12px">
          <button class="primary-btn btn-with-icon" type="button">
            <span>上传报告</span>
          </button>
          <button class="secondary-btn btn-with-icon" type="button">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M17 21c0-1.7-1.3-3-3-3H10c-1.7 0-3 1.3-3 3"/><circle cx="12" cy="8" r="4"/><path d="M20 8h2"/><path d="M2 8h2"/></svg>
            <span>查看家人</span>
          </button>
        </div>
      </section>
    </section>

    <nav class="bottom-tab" aria-label="底部导航">
      <a class="tab-item active" href="home-fixed.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span></a>
      <a class="tab-item" href="family-fixed.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>家人</span></a>
      <a class="tab-item" href="reports-fixed.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>报告</span></a>
      <a class="tab-item" href="more-fixed.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></a>
    </nav>
  </main>
</body>
</html>
