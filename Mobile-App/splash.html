<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我家手帖启动页</title>
  <style>
    :root {
      --bg: oklch(97.4% 0.014 91.1);
      --surface: oklch(100% 0 0);
      --fg: oklch(30.1% 0.023 221.2);
      --muted: oklch(51.3% 0.035 208.4);
      --border: oklch(91.7% 0.014 202.1);
      --accent: oklch(67.9% 0.108 184.2);
      --forest: #2f6f65;
      --moss: #7aa06a;
      --lake: #d7eaf4;
      --mist: #e7f1ef;
      --paper: #f8f6f1;
      --cream: #fffdf8;
      --warm: #f2a65a;
      --font-display: 'Iowan Old Style', 'Songti SC', 'Noto Serif SC', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      --font-mono: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--fg);
      font-family: var(--font-body);
      background: var(--bg);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .26;
      background-image: radial-gradient(rgba(38, 50, 56, .08) .55px, transparent .7px);
      background-size: 16px 16px;
      mix-blend-mode: multiply;
    }
    .device {
      position: relative;
      width: 393px;
      height: 852px;
      padding: 12px;
      border-radius: 56px;
      background: #243136;
      box-shadow: 0 28px 70px rgba(38, 50, 56, .22);
    }
    .device::before, .device::after {
      content: '';
      position: absolute;
      top: 104px;
      bottom: 104px;
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,.08) 12%, transparent 24%, transparent 76%, rgba(255,255,255,.06) 88%, transparent);
      pointer-events: none;
    }
    .device::before { left: -1px; }
    .device::after { right: -1px; }
    .btn-rail {
      position: absolute;
      z-index: 1;
      width: 4px;
      border-radius: 2px;
      background: #101719;
    }
    .btn-rail.left-1 { left: -3px; top: 176px; height: 32px; }
    .btn-rail.left-2 { left: -3px; top: 222px; height: 60px; }
    .btn-rail.left-3 { left: -3px; top: 292px; height: 60px; }
    .btn-rail.right-1 { right: -3px; top: 252px; height: 100px; }
    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 44px;
      background: var(--paper);
      isolation: isolate;
    }
    .screen::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      opacity: .24;
      background-image:
        radial-gradient(rgba(38, 50, 56, .08) .45px, transparent .55px),
        radial-gradient(rgba(255, 255, 255, .7) .45px, transparent .55px);
      background-position: 0 0, 6px 8px;
      background-size: 15px 15px;
      mix-blend-mode: multiply;
    }
    .status {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px 0;
      font: 700 14px var(--font-body);
      color: #253137;
    }
    .island {
      position: absolute;
      z-index: 12;
      top: 14px;
      left: 50%;
      width: 92px;
      height: 28px;
      border-radius: 999px;
      background: #172024;
      transform: translateX(-50%);
    }
    .icons { display: flex; gap: 6px; align-items: center; color: #263238; }
    .icons svg { display: block; width: 17px; height: 11px; fill: currentColor; }
    .icons .battery { width: 25px; }
    .canvas {
      position: absolute;
      inset: 0;
      border-radius: 44px;
      overflow: hidden;
      background: var(--paper);
    }
    .splash-art {
      position: absolute;
      inset: 0;
      margin: 0;
    }
    .splash-art img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
    }
    .moon, .star, .cloud, .hill, .lake, .path, .tree, .roof, .window { position: absolute; }
    .moon { right: 42px; top: 18px; width: 42px; height: 42px; border-radius: 50%; background: #fff7dd; box-shadow: 0 0 0 16px rgba(255, 253, 248, .46); }
    .star { width: 7px; height: 7px; border-radius: 50%; background: var(--warm); opacity: .72; }
    .star.s1 { left: 34px; top: 64px; }
    .star.s2 { left: 230px; top: 92px; width: 5px; height: 5px; }
    .cloud { left: 58px; top: 124px; width: 112px; height: 36px; border-radius: 999px; background: var(--cream); opacity: .9; }
    .cloud::before { content: ''; position: absolute; left: 22px; top: -16px; width: 48px; height: 48px; border-radius: 50%; background: var(--cream); }
    .cloud::after { content: ''; position: absolute; right: 18px; top: -10px; width: 36px; height: 36px; border-radius: 50%; background: var(--cream); }
    .hill.back { left: -34px; right: -20px; bottom: 160px; height: 250px; border-radius: 52% 48% 0 0; background: #dfeedd; transform: rotate(-2deg); }
    .hill.front { left: 64px; right: -60px; bottom: 130px; height: 210px; border-radius: 58% 42% 0 0; background: #bcd8bd; transform: rotate(4deg); }
    .lake { left: 10px; right: 16px; bottom: 82px; height: 142px; border-radius: 50% 46% 44% 52%; background: var(--lake); }
    .lake::after { content: ''; position: absolute; left: 46px; right: 38px; top: 52px; height: 12px; border-radius: 999px; border-top: 2px solid rgba(47, 111, 101, .26); }
    .path { left: 120px; bottom: 52px; width: 88px; height: 160px; border-radius: 48% 52% 0 0; background: #efe7d3; transform: rotate(9deg); opacity: .95; }
    .tree { left: 36px; bottom: 210px; width: 48px; height: 76px; border-radius: 26px 26px 22px 22px; background: #6f9561; transform: rotate(-8deg); }
    .tree::after { content: ''; position: absolute; left: 20px; bottom: -26px; width: 8px; height: 38px; border-radius: 999px; background: #82765e; }
    .tree.t2 { left: auto; right: 32px; bottom: 238px; width: 58px; height: 90px; background: #7aa06a; transform: rotate(6deg); }
    .roof {
      left: 50%;
      bottom: 232px;
      width: 126px;
      height: 92px;
      border-radius: 52px 52px 18px 18px;
      background: var(--forest);
      transform: translateX(-50%);
      box-shadow: 0 16px 36px rgba(38, 50, 56, .08);
    }
    .roof::before {
      content: '';
      position: absolute;
      left: -22px;
      top: -30px;
      width: 170px;
      height: 54px;
      border-radius: 48% 52% 15px 15px;
      background: var(--moss);
      transform: rotate(-3deg);
    }
    .window { left: 42px; bottom: 24px; width: 42px; height: 50px; border-radius: 22px 22px 12px 12px; background: #fffdf8; }
    .brand {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 38px;
      text-align: center;
      z-index: 8;
    }
    h1 { margin: 0; font-family: var(--font-display); font-size: 40px; line-height: 1; letter-spacing: .08em; }
    .jp { margin-top: 8px; color: var(--teal-dark); font-size: 15px; letter-spacing: .18em; }
    .tagline { margin-top: 18px; color: var(--muted); font-size: 14px; letter-spacing: .14em; }
    .home-indicator { position: absolute; z-index: 12; left: 50%; bottom: 12px; width: 134px; height: 5px; border-radius: 999px; background: #263238; transform: translateX(-50%); opacity: .9; }
    @media (max-width: 460px) { body { padding: 12px; } .device { transform: scale(.92); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  </style>
</head>
<body>
  <div class="device" aria-label="我家手帖启动页手机预览" data-od-id="device">
    <span class="btn-rail left-1" aria-hidden="true"></span><span class="btn-rail left-2" aria-hidden="true"></span><span class="btn-rail left-3" aria-hidden="true"></span><span class="btn-rail right-1" aria-hidden="true"></span>
    <div class="screen">
      <div class="status" aria-hidden="true"><span>9:41</span><span class="icons"><svg viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.6"/><rect x="4" y="5" width="3" height="6" rx="0.6"/><rect x="8" y="3" width="3" height="8" rx="0.6"/><rect x="12" y="0" width="3" height="11" rx="0.6"/></svg><svg viewBox="0 0 17 11"><path d="M8.5 1.5C5.5 1.5 2.7 2.6.5 4.6L2 6.1c1.8-1.6 4.1-2.5 6.5-2.5s4.7.9 6.5 2.5l1.5-1.5c-2.2-2-5-3.1-8-3.1zM3.5 7.6 5 9.1c1-.9 2.2-1.4 3.5-1.4s2.5.5 3.5 1.4l1.5-1.5c-1.4-1.3-3.1-2-5-2s-3.6.7-5 2zM6.5 10.6l2 2 2-2c-.5-.5-1.2-.8-2-.8s-1.5.3-2 .8z"/></svg><svg class="battery" viewBox="0 0 25 11"><rect x=".5" y=".5" width="21" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-opacity=".45"/><rect x="22" y="3.5" width="1.5" height="4" rx=".4" fill="currentColor" fill-opacity=".45"/><rect x="2" y="2" width="18" height="7" rx="1.4"/></svg></span></div>
      <div class="island" aria-hidden="true"></div>
      <main class="canvas" aria-label="启动页主视觉" data-od-id="content">
        <figure class="splash-art" aria-label="我家手帖启动页插画">
          <img src="mqjdd0c9-3ee6dc794e7a4876177859466a898bc5.jpg" alt="我家手帖启动页插画：月光、湖面、山丘与屋檐" />
        </figure>
      </main>
      <div class="home-indicator" aria-hidden="true"></div>
    </div>
  </div>
</body>
</html>
